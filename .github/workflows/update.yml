name: Daily results update

on:
  schedule:
    # 13:00 UTC every day (adjust to taste — this is ~9pm AWST/Perth time)
    - cron: "0 13 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull latest results into data.json
        run: node scripts/update-data.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name "wc-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update results $(date -u +'%Y-%m-%d')"
          git push
